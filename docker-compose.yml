services:
  backend:
    build: .
    container_name: kimibuilt-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kimibuilt}
      - POSTGRES_USER=${POSTGRES_USER:-kimibuilt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kimibuilt}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_API_VERSION=1.52
      - KIMIBUILT_DATA_DIR=/home/kimibuilt/.kimibuilt
      - KIMIBUILT_STATE_DIR=/home/kimibuilt/.kimibuilt
      - NODE_OPTIONS=--max-old-space-size=4096
      - UV_THREADPOOL_SIZE=16
      - OPENAI_IMAGE_BATCH_CONCURRENCY=${OPENAI_IMAGE_BATCH_CONCURRENCY:-5}
      - PODCAST_TTS_CONCURRENCY=${PODCAST_TTS_CONCURRENCY:-2}
    volumes:
      - backend_state:/home/kimibuilt/.kimibuilt
    cpus: 4
    mem_reservation: 2g
    mem_limit: 6g
    depends_on:
      docker-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: kimibuilt-docker-proxy
    restart: unless-stopped
    environment:
      - AUTH=1
      - CONTAINERS=1
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - POST=1
      - VERSION=1
      - VOLUMES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:16
    container_name: kimibuilt-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=1536MB
      - -c
      - effective_cache_size=12GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=100
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - random_page_cost=1.1
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-kimibuilt}
      - POSTGRES_USER=${POSTGRES_USER:-kimibuilt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kimibuilt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    cpus: 3
    mem_reservation: 2g
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kimibuilt} -d ${POSTGRES_DB:-kimibuilt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kimibuilt-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=2
      - QDRANT__SERVICE__MAX_WORKERS=4
    volumes:
      - qdrant_data:/qdrant/storage
    cpus: 4
    mem_reservation: 2g
    mem_limit: 5g
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: kimibuilt-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_QUEUE=256
    volumes:
      - ollama_data:/root/.ollama
    cpus: 6
    mem_reservation: 3g
    mem_limit: 8g
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        /bin/ollama pull nomic-embed-text:latest
        wait

volumes:
  backend_state:
  postgres_data:
  qdrant_data:
  ollama_data:
