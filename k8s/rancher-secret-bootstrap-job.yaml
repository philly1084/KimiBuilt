apiVersion: v1
kind: Namespace
metadata:
  name: secret-bootstrap
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-bootstrap
  namespace: secret-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-bootstrap
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-bootstrap
subjects:
  - kind: ServiceAccount
    name: secret-bootstrap
    namespace: secret-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-bootstrap
  namespace: secret-bootstrap
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: secret-bootstrap
      containers:
        - name: kubectl
          image: bitnami/kubectl:1.30
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              rand() {
                tr -dc 'A-Za-z0-9' < /dev/urandom | head -c "${1:-48}"
              }

              check_secret() {
                ns="$1"
                secret="$2"
                shift 2
                echo "$ns/$secret"
                for key in "$@"; do
                  value="$(kubectl get secret "$secret" -n "$ns" -o "jsonpath={.data.$key}" | base64 -d)"
                  case "$value" in
                    ""|change-me|replace-me|replace-after-gitlab-boot|replace-after-gitea-boot|SET_VIA_KUBECTL_CREATE_SECRET|OPTIONAL_SET_VIA_KUBECTL_CREATE_SECRET)
                      echo "  $key: MISSING_OR_PLACEHOLDER"
                      ;;
                    *)
                      echo "  $key: SET"
                      ;;
                  esac
                done
              }

              kubectl get nodes >/dev/null
              kubectl create namespace kimibuilt --dry-run=client -o yaml | kubectl apply -f -
              kubectl create namespace agent-platform --dry-run=client -o yaml | kubectl apply -f -

              kubectl -n kimibuilt create secret generic kimibuilt-secrets \
                --from-literal=OPENAI_API_KEY="$(rand 48)" \
                --from-literal=N8N_API_KEY="$(rand 48)" \
                --from-literal=OPENAI_MEDIA_API_KEY="$(rand 48)" \
                --from-literal=PERPLEXITY_API_KEY="$(rand 48)" \
                --from-literal=LILLYBUILT_AUTH_USERNAME="admin" \
                --from-literal=LILLYBUILT_AUTH_PASSWORD="$(rand 48)" \
                --from-literal=LILLYBUILT_JWT_SECRET="$(rand 64)" \
                --from-literal=KIMIBUILT_REMOTE_RUNNER_TOKEN="$(rand 64)" \
                --from-literal=POSTGRES_PASSWORD="$(rand 48)" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl -n agent-platform create secret generic gitlab-root \
                --from-literal=username="root" \
                --from-literal=password="$(rand 48)" \
                --from-literal=email="admin@demoserver2.buzz" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl -n agent-platform create secret generic gitlab-runner \
                --from-literal=runner-token="replace-after-gitlab-boot" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl -n agent-platform create secret generic agent-platform-runtime \
                --from-literal=gitlab-registry-host="registry.gitlab.demoserver2.buzz" \
                --from-literal=gitlab-registry-username="root" \
                --from-literal=gitlab-registry-password="$(rand 48)" \
                --from-literal=kimibuilt-build-events-url="https://kimibuilt.demoserver2.buzz/api/integrations/gitlab/build-events" \
                --from-literal=kimibuilt-build-events-secret="$(rand 64)" \
                --from-literal=kimibuilt-build-events-insecure="0" \
                --from-literal=buildkit-host="tcp://buildkitd.agent-platform.svc.cluster.local:1234" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Secrets generated and applied."
              check_secret kimibuilt kimibuilt-secrets OPENAI_API_KEY N8N_API_KEY OPENAI_MEDIA_API_KEY PERPLEXITY_API_KEY LILLYBUILT_AUTH_USERNAME LILLYBUILT_AUTH_PASSWORD LILLYBUILT_JWT_SECRET KIMIBUILT_REMOTE_RUNNER_TOKEN POSTGRES_PASSWORD
              check_secret agent-platform gitlab-root username password email
              check_secret agent-platform gitlab-runner runner-token
              check_secret agent-platform agent-platform-runtime gitlab-registry-host gitlab-registry-username gitlab-registry-password kimibuilt-build-events-url kimibuilt-build-events-secret kimibuilt-build-events-insecure buildkit-host
