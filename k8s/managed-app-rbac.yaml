---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kimibuilt-managed-apps
  namespace: kimibuilt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kimibuilt-managed-apps
rules:
  - apiGroups: ['']
    resources: ['namespaces']
    verbs: ['get', 'list', 'create']
  - apiGroups: ['']
    resources: ['secrets', 'services']
    verbs: ['get', 'list', 'create', 'update', 'patch']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'list', 'create', 'update', 'patch']
  - apiGroups: ['networking.k8s.io']
    resources: ['ingresses']
    verbs: ['get', 'list', 'create', 'update', 'patch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kimibuilt-managed-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kimibuilt-managed-apps
subjects:
  - kind: ServiceAccount
    name: kimibuilt-managed-apps
    namespace: kimibuilt
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kimibuilt-managed-app-scope
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ['']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE', 'PATCH']
        resources: ['namespaces', 'secrets', 'services']
      - apiGroups: ['apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE', 'PATCH']
        resources: ['deployments']
      - apiGroups: ['networking.k8s.io']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE', 'PATCH']
        resources: ['ingresses']
  matchConditions:
    - name: managedAppServiceAccount
      expression: 'request.userInfo.username == "system:serviceaccount:kimibuilt:kimibuilt-managed-apps"'
  validations:
    - expression: 'request.resource.resource == "namespaces" ? object.metadata.name.startsWith("app-") : request.namespace.startsWith("app-")'
      message: Managed app operations are limited to app-* namespaces.
    - expression: 'request.resource.resource != "namespaces" || (has(object.metadata.labels) && object.metadata.labels["kimibuilt.io/managed-app"] == "true")'
      message: Managed app namespaces must be labeled kimibuilt.io/managed-app=true.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kimibuilt-managed-app-scope
spec:
  policyName: kimibuilt-managed-app-scope
  validationActions:
    - Deny
