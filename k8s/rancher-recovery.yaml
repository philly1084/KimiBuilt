apiVersion: v1
kind: Namespace
metadata:
  name: kimibuilt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_IMAGE_MODEL: "gemini-2.5-flash-image-nb"
  OPENAI_MEDIA_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MEDIA_IMAGE_MODEL: "gpt-image-1.5"
  OPENAI_MEDIA_VIDEO_MODEL: "sora-2"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "kimibuilt"
  POSTGRES_USER: "kimibuilt"
  POSTGRES_SSL: "false"
  FRONTEND_PATH: "/app/frontend"
  ARTIFACT_BROWSER_PATH: "/usr/bin/chromium"
  ARTIFACT_BROWSER_ARGS: "--disable-software-rasterizer"
  ARTIFACT_PDF_TIMEOUT_MS: "15000"
  PORT: "3000"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-nginx-config
  namespace: kimibuilt
data:
  default.conf: |
    server {
      listen 80;
      listen [::]:80;
      server_name _;

      client_max_body_size 25m;

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location = / {
        return 302 /login;
      }

      location = /login {
        proxy_pass http://backend:3000/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /ws {
        proxy_pass http://backend:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location /v1/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location @login_redirect {
        return 302 /login?returnTo=$request_uri;
      }

      location / {
        proxy_intercept_errors on;
        error_page 401 = @login_redirect;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kimibuilt
  labels:
    app: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: nginx-config
          configMap:
            name: kimibuilt-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kimibuilt
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: kimibuilt-cors
  namespace: kimibuilt
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://kimibuilt.secdevsolutions.help"
      - "http://localhost:8080"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimibuilt-ingress
  namespace: kimibuilt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: kimibuilt-cors@kubernetescrd
    traefik.ingress.kubernetes.io/proxy-read-timeout: "300"
    traefik.ingress.kubernetes.io/proxy-send-timeout: "300"
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
spec:
  tls:
    - hosts:
        - kimibuilt.secdevsolutions.help
      secretName: kimibuilt-tls
  rules:
    - host: kimibuilt.secdevsolutions.help
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
