# Simplified Rancher Deployment - Same Domain
# Backend serves frontend static files and API from the same pod.
# Domain: kimibuilt.secdevsolutions.help
# Requires existing secret: kimibuilt-secrets with OPENAI_API_KEY and POSTGRES_PASSWORD.
# Optional remote deploy defaults are set below.
# Optional SSH secret keys for backend-driven deploys:
# - KIMIBUILT_SSH_HOST
# - KIMIBUILT_SSH_PORT
# - KIMIBUILT_SSH_USERNAME
# - KIMIBUILT_SSH_PASSWORD

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimibuilt-ingress
  namespace: kimibuilt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/proxy-read-timeout: "300"
    traefik.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
    - hosts:
        - kimibuilt.secdevsolutions.help
      secretName: kimibuilt-tls
  rules:
    - host: kimibuilt.secdevsolutions.help
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          env:
            - name: FRONTEND_PATH
              value: /app/frontend
            - name: ARTIFACT_BROWSER_PATH
              value: /usr/bin/chromium
            - name: ARTIFACT_PDF_TIMEOUT_MS
              value: "15000"
            - name: KIMIBUILT_DEPLOY_REPO_URL
              value: https://github.com/philly1084/KimiBuilt.git
            - name: KIMIBUILT_DEPLOY_TARGET_DIR
              value: /opt/kimibuilt
            - name: KIMIBUILT_DEPLOY_MANIFESTS_PATH
              value: k8s
            - name: KIMIBUILT_DEPLOY_NAMESPACE
              value: kimibuilt
            - name: KIMIBUILT_DEPLOY_DEPLOYMENT
              value: backend
            - name: KIMIBUILT_DEPLOY_CONTAINER
              value: backend
            - name: KIMIBUILT_DEPLOY_BRANCH
              value: master
            - name: KIMIBUILT_STATE_DIR
              value: /home/kimibuilt/.kimibuilt
          volumeMounts:
            - name: backend-state
              mountPath: /home/kimibuilt/.kimibuilt
      volumes:
        - name: backend-state
          persistentVolumeClaim:
            claimName: backend-state

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-state
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
