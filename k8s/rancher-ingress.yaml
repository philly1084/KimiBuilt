# Rancher Ingress Configuration
# This exposes KimiBuilt backend at /v1 and frontend at root path
# on your domain: kimibuilt.secdevsolutions.help

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimibuilt-ingress
  namespace: kimibuilt
  annotations:
    # Traefik annotations for Rancher/k3s
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Enable CORS for frontend-backend communication
    traefik.ingress.kubernetes.io/router.middlewares: kimibuilt-cors@kubernetescrd
    # Increase timeouts for long-running AI requests
    traefik.ingress.kubernetes.io/proxy-read-timeout: "300"
    traefik.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
spec:
  tls:
    - hosts:
        - kimibuilt.secdevsolutions.help
      secretName: kimibuilt-tls  # You'll need to create this TLS secret
  rules:
    - host: kimibuilt.secdevsolutions.help
      http:
        paths:
          # Backend API at /v1/* (OpenAI-compatible endpoints)
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Health endpoint at /health
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # WebSocket at /ws
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Frontend static files at root
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

---
# CORS Middleware for Traefik
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: kimibuilt-cors
  namespace: kimibuilt
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://kimibuilt.secdevsolutions.help"
      - "http://localhost:8080"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true

---
# Frontend Service (NGINX serving static files)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kimibuilt
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http

---
# Frontend Deployment (NGINX serving the 4 frontends)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kimibuilt
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: frontend-files
          configMap:
            name: frontend-files
        - name: nginx-config
          configMap:
            name: nginx-config

---
# NGINX Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: kimibuilt
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Enable gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # CLI frontend at /cli/
        location /cli/ {
            alias /usr/share/nginx/html/cli/;
            try_files $uri $uri/ /cli/index.html;
        }

        # Web Chat at /web-chat/
        location /web-chat/ {
            alias /usr/share/nginx/html/web-chat/;
            try_files $uri $uri/ /web-chat/index.html;
        }

        # Canvas at /canvas/
        location /canvas/ {
            alias /usr/share/nginx/html/canvas-excalidraw/;
            try_files $uri $uri/ /canvas/index.html;
        }

        # Notes at /notes/
        location /notes/ {
            alias /usr/share/nginx/html/notes-notion/;
            try_files $uri $uri/ /notes/index.html;
        }

        # Default to web-chat
        location = / {
            return 302 /web-chat/;
        }

        # Handle SPA routing
        location / {
            try_files $uri $uri/ =404;
        }
    }

---
# Frontend Files ConfigMap
# NOTE: This is a placeholder - you need to populate with actual files
# Run: kubectl create configmap frontend-files --from-file=cli/ --from-file=web-chat/ --from-file=canvas-excalidraw/ --from-file=notes-notion/ -n kimibuilt
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-files
  namespace: kimibuilt
data:
  # Placeholder - files should be loaded via kubectl create configmap
  README.txt: |
    To load frontend files:
    
    1. From the KimiBuilt directory:
       kubectl create configmap frontend-files \
         --from-file=cli/ \
         --from-file=web-chat/ \
         --from-file=canvas-excalidraw/ \
         --from-file=notes-notion/ \
         -n kimibuilt \
         --dry-run=client -o yaml > frontend-files-configmap.yaml
    
    2. Apply the configmap:
       kubectl apply -f frontend-files-configmap.yaml
    
    Or use a simpler approach - serve frontends separately or use a CDN.

---
# Alternative: Use a single combined frontend index
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-index
  namespace: kimibuilt
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>KimiBuilt AI</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                max-width: 800px;
                margin: 50px auto;
                padding: 20px;
                background: #0d0d0d;
                color: #fafafa;
            }
            h1 { color: #3b82f6; }
            .frontend-list {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-top: 30px;
            }
            .frontend-card {
                background: #1f1f1f;
                border: 1px solid #333;
                border-radius: 12px;
                padding: 20px;
                text-decoration: none;
                color: inherit;
                transition: all 0.2s;
            }
            .frontend-card:hover {
                border-color: #3b82f6;
                transform: translateY(-2px);
            }
            .frontend-card h3 {
                margin-top: 0;
                color: #3b82f6;
            }
            .status {
                margin-top: 20px;
                padding: 15px;
                background: #1f1f1f;
                border-radius: 8px;
                font-family: monospace;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <h1>🚀 KimiBuilt AI Platform</h1>
        <p>Choose your interface:</p>
        
        <div class="frontend-list">
            <a href="/cli/README.md" class="frontend-card">
                <h3>💻 CLI</h3>
                <p>Terminal-based interface for power users. Node.js required.</p>
            </a>
            
            <a href="/web-chat/" class="frontend-card">
                <h3>💬 Web Chat</h3>
                <p>ChatGPT-style conversational interface.</p>
            </a>
            
            <a href="/canvas/" class="frontend-card">
                <h3>🎨 Canvas</h3>
                <p>Excalidraw-style whiteboard for visual AI.</p>
            </a>
            
            <a href="/notes/" class="frontend-card">
                <h3>📝 Notes</h3>
                <p>Notion-style block editor for structured content.</p>
            </a>
        </div>
        
        <div class="status">
            <strong>Backend Status:</strong> <span id="status">Checking...</span><br>
            <strong>API Base:</strong> <span id="api-base">/v1</span>
        </div>
        
        <script>
            // Check backend health
            fetch('/health')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status').textContent = 
                        data.status === 'healthy' ? '✅ Online' : '⚠️ Degraded';
                    document.getElementById('status').style.color = 
                        data.status === 'healthy' ? '#22c55e' : '#f59e0b';
                })
                .catch(() => {
                    document.getElementById('status').textContent = '❌ Offline';
                    document.getElementById('status').style.color = '#ef4444';
                });
        </script>
    </body>
    </html>
