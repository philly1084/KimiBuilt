# Requires existing secret: kimibuilt-secrets with OPENAI_API_KEY and POSTGRES_PASSWORD.
# Rancher Ingress Configuration
# This exposes KimiBuilt through the backend service, which serves both API and static frontends.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimibuilt-ingress
  namespace: kimibuilt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: kimibuilt-cors@kubernetescrd
    traefik.ingress.kubernetes.io/proxy-read-timeout: "300"
    traefik.ingress.kubernetes.io/proxy-send-timeout: "300"
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
spec:
  tls:
    - hosts:
        - kimibuilt.secdevsolutions.help
      secretName: kimibuilt-tls
  rules:
    - host: kimibuilt.secdevsolutions.help
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kimibuilt-cors
  namespace: kimibuilt
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://kimibuilt.secdevsolutions.help"
      - "http://localhost:8080"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true
