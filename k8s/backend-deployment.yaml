apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          volumeMounts:
            - name: backend-state
              mountPath: /home/kimibuilt/.kimibuilt
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: backend-state
          persistentVolumeClaim:
            claimName: backend-state
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
