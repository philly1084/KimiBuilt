apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  # Use internal n8n-openai-cli-gateway service for OpenAI API
  # This routes through your gateway for logging/rate limiting/etc
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  PORT: "3000"
  NODE_ENV: "production"
