apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  API_BASE_URL: "https://kimibuilt.demoserver2.buzz"
  # Chat/tool traffic and frontend image generation stay on the internal OpenAI-compatible gateway.
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_IMAGE_MODEL: "gpt-image-2"
  # Server-side Agents SDK MCP connection for remote CLI coding agents.
  REMOTE_CLI_MCP_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/mcp"
  REMOTE_CLI_MCP_NAME: "remote-cli"
  REMOTE_CLI_DEFAULT_TARGET_ID: "prod"
  REMOTE_CLI_DEFAULT_CWD: "/srv/apps/my-app"
  REMOTE_CLI_AGENT_OPENAI_API_MODE: "chat"
  REMOTE_CLI_AGENT_MAX_TURNS: "20"

  # The official OpenAI media endpoint remains available for video generation and image fallback.
  OPENAI_MEDIA_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MEDIA_IMAGE_MODEL: "gpt-image-2"
  OPENAI_MEDIA_VIDEO_MODEL: "sora-2"
  TTS_PROVIDER: "kokoro"
  TTS_FALLBACK_PROVIDER: "piper"
  TTS_FALLBACK_ENABLED: "true"
  KOKORO_TTS_ENABLED: "true"
  KOKORO_TTS_MODEL_ID: "onnx-community/Kokoro-82M-v1.0-ONNX"
  KOKORO_TTS_BASE_URL: "http://kokoro-tts:3001"
  KOKORO_TTS_DEVICE: "cpu"
  KOKORO_TTS_DTYPE: "q8"
  KOKORO_TTS_CACHE_DIR: "/app/data/kokoro/cache"
  KOKORO_TTS_ALLOW_REMOTE_MODELS: "false"
  KOKORO_TTS_PORT: "3001"
  KOKORO_TTS_VOICES_PATH: "/app/data/kokoro/voices/manifest.json"
  KOKORO_TTS_DEFAULT_VOICE_ID: "af_heart"
  KOKORO_TTS_TIMEOUT_MS: "120000"
  KOKORO_TTS_PODCAST_TIMEOUT_MS: "300000"
  KOKORO_TTS_PODCAST_CHUNK_CHARS: "700"
  PODCAST_TTS_CONCURRENCY: "1"
  AUDIO_PROCESSING_TIMEOUT_MS: "900000"
  PODCAST_MASTERING_ENABLED: "false"
  PODCAST_TOOL_TIMEOUT_MS: "2700000"
  PODCAST_VIDEO_SEGMENT_TIMEOUT_MS: "240000"
  PODCAST_VIDEO_MUX_TIMEOUT_MS: "900000"
  PODCAST_VIDEO_MAX_FFMPEG_TIMEOUT_MS: "1800000"
  PODCAST_VIDEO_RENDER_MODE: "storyboard"
  PODCAST_VIDEO_DEFAULT_SCENE_COUNT: "14"
  PODCAST_VIDEO_AUDIO_REPAIR_ENABLED: "false"
  PODCAST_VIDEO_X264_PRESET: "veryfast"
  PODCAST_VIDEO_X264_CRF: "23"

  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "kimibuilt"
  POSTGRES_USER: "kimibuilt"
  ARTIFACT_BROWSER_PATH: "/usr/bin/chromium"
  ARTIFACT_PDF_TIMEOUT_MS: "15000"
  KIMIBUILT_DEPLOY_REPO_URL: "https://github.com/philly1084/KimiBuilt.git"
  KIMIBUILT_DEPLOY_TARGET_DIR: "/opt/kimibuilt"
  KIMIBUILT_DEPLOY_MANIFESTS_PATH: "k8s"
  KIMIBUILT_DEPLOY_NAMESPACE: "kimibuilt"
  KIMIBUILT_DEPLOY_DEPLOYMENT: "backend"
  KIMIBUILT_DEPLOY_CONTAINER: "backend"
  KIMIBUILT_DEPLOY_BRANCH: "master"
  KIMIBUILT_GIT_COMMIT_NAME: "KimiBuilt Agent"
  KIMIBUILT_GIT_COMMIT_EMAIL: "kimibuilt-agent@local.invalid"
  KIMIBUILT_REMOTE_RUNNER_ENABLED: "true"
  KIMIBUILT_REMOTE_RUNNER_PREFERRED: "true"
  KIMIBUILT_DATA_DIR: "/home/kimibuilt/.kimibuilt"
  KIMIBUILT_STATE_DIR: "/home/kimibuilt/.kimibuilt"
  GITEA_ENABLED: "false"
  MANAGED_APPS_DEPLOY_TARGET: "runner"
  OPENCODE_ENABLED: "false"
  PORT: "3000"
  NODE_ENV: "production"
