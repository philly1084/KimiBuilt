# Test bootstrap for the separate k3s GitLab managed-app platform. The runner
# starts scaled to 0 until a real GitLab runner auth token is provided.
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-platform
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-root
  namespace: agent-platform
type: Opaque
stringData:
  username: root
  password: change-me
  email: admin@demoserver2.buzz
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner
  namespace: agent-platform
type: Opaque
stringData:
  runner-token: replace-after-gitlab-boot
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-runtime
  namespace: agent-platform
type: Opaque
stringData:
  gitlab-registry-host: registry.gitlab.demoserver2.buzz
  gitlab-registry-username: change-me
  gitlab-registry-password: change-me
  kimibuilt-build-events-url: https://kimibuilt.demoserver2.buzz/api/integrations/gitlab/build-events
  kimibuilt-build-events-secret: change-me
  kimibuilt-build-events-insecure: "0"
  buildkit-host: tcp://buildkitd.agent-platform.svc.cluster.local:1234
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-omnibus-config
  namespace: agent-platform
data:
  GITLAB_OMNIBUS_CONFIG: |
    external_url 'https://gitlab.demoserver2.buzz'
    registry_external_url 'https://registry.gitlab.demoserver2.buzz'

    letsencrypt['enable'] = false
    nginx['listen_port'] = 80
    nginx['listen_https'] = false
    registry_nginx['listen_port'] = 5050
    registry_nginx['listen_https'] = false
    gitlab_rails['gitlab_shell_ssh_port'] = 22

    puma['worker_processes'] = 0
    sidekiq['concurrency'] = 10
    prometheus_monitoring['enable'] = false
    alertmanager['enable'] = false
    gitlab_exporter['enable'] = false
    gitlab_kas['enable'] = false
    node_exporter['enable'] = false
    postgres_exporter['enable'] = false
    prometheus['enable'] = false
    puma['exporter_enabled'] = false
    redis_exporter['enable'] = false
    sidekiq['metrics_enabled'] = false
    gitlab_rails['env'] = {
      'MALLOC_CONF' => 'dirty_decay_ms:1000,muzzy_decay_ms:1000'
    }
    gitaly['env'] = {
      'MALLOC_CONF' => 'dirty_decay_ms:1000,muzzy_decay_ms:1000',
      'GITALY_COMMAND_SPAWN_MAX_PARALLEL' => '2'
    }
    gitaly['configuration'] = {
      concurrency: [
        {
          'rpc' => "/gitaly.SmartHTTPService/PostReceivePack",
          'max_per_repo' => 3,
        },
        {
          'rpc' => "/gitaly.SSHService/SSHUploadPack",
          'max_per_repo' => 3,
        },
      ],
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-logs
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 40Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-runner-config
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkit-cache
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: agent-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:18.11.1-ce.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-root
                  key: password
            - name: GITLAB_OMNIBUS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: gitlab-omnibus-config
                  key: GITLAB_OMNIBUS_CONFIG
          ports:
            - containerPort: 80
              name: http
            - containerPort: 5050
              name: registry
            - containerPort: 22
              name: ssh
          readinessProbe:
            httpGet:
              path: /users/sign_in
              port: http
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab
            - name: logs
              mountPath: /var/log/gitlab
            - name: data
              mountPath: /var/opt/gitlab
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: logs
          persistentVolumeClaim:
            claimName: gitlab-logs
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-http
  namespace: agent-platform
spec:
  selector:
    app: gitlab
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: registry
      port: 5050
      targetPort: registry
    - name: ssh
      port: 22
      targetPort: ssh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.17.2
          args:
            - --addr=tcp://0.0.0.0:1234
          ports:
            - containerPort: 1234
              name: buildkit
          securityContext:
            privileged: true
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkit-cache
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: agent-platform
spec:
  selector:
    app: buildkitd
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner
  namespace: agent-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gitlab-runner
  template:
    metadata:
      labels:
        app: gitlab-runner
    spec:
      containers:
        - name: gitlab-runner
          image: gitlab/gitlab-runner:alpine-v18.11.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - |
              set -eu
              case "${RUNNER_TOKEN:-}" in
                ""|change-me|replace-me|replace-after-gitlab-boot)
                  echo "GitLab runner token is missing; set GITLAB_RUNNER_TOKEN and rerun the bootstrap/update script." >&2
                  sleep 3600
                  exit 1
                  ;;
              esac
              if [ ! -s /etc/gitlab-runner/config.toml ]; then
                register_token_flag="--registration-token"
                case "$RUNNER_TOKEN" in
                  glrt-*|glrtr-*)
                    register_token_flag="--token"
                    ;;
                esac
                gitlab-runner register --non-interactive \
                  --url "$CI_SERVER_URL" \
                  "$register_token_flag" "$RUNNER_TOKEN" \
                  --name "${RUNNER_NAME:-agent-platform-runner}" \
                  --executor shell \
                  --tag-list "${RUNNER_TAG_LIST:-kimibuilt,buildkit}" \
                  --run-untagged="false" \
                  --locked="false"
              fi
              exec gitlab-runner run --working-directory=/builds
          env:
            - name: CI_SERVER_URL
              value: https://gitlab.demoserver2.buzz
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitlab-runner
                  key: runner-token
            - name: RUNNER_NAME
              value: agent-platform-runner
            - name: RUNNER_TAG_LIST
              value: kimibuilt,buildkit
            - name: GITLAB_REGISTRY_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitlab-registry-host
            - name: GITLAB_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitlab-registry-username
            - name: GITLAB_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitlab-registry-password
            - name: KIMIBUILT_BUILD_EVENTS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-url
            - name: KIMIBUILT_BUILD_EVENTS_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-secret
            - name: KIMIBUILT_BUILD_EVENTS_INSECURE
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-insecure
            - name: BUILDKIT_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: buildkit-host
          volumeMounts:
            - name: runner-config
              mountPath: /etc/gitlab-runner
            - name: runner-builds
              mountPath: /builds
      volumes:
        - name: runner-config
          persistentVolumeClaim:
            claimName: gitlab-runner-config
        - name: runner-builds
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  namespace: agent-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - gitlab.demoserver2.buzz
      secretName: gitlab-tls
  rules:
    - host: gitlab.demoserver2.buzz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-http
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-registry
  namespace: agent-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - registry.gitlab.demoserver2.buzz
      secretName: gitlab-registry-tls
  rules:
    - host: registry.gitlab.demoserver2.buzz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-http
                port:
                  number: 5050
