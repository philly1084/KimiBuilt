# Apply this manifest set to the separate k3s cluster that hosts the external
# Gitea control plane. It is intentionally separate from the KimiBuilt app
# cluster.
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-platform
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin
  namespace: agent-platform
type: Opaque
stringData:
  username: admin
  password: change-me
  email: admin@demoserver2.buzz
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-actions
  namespace: agent-platform
type: Opaque
stringData:
  shared-secret: change-me
  runner-registration-token: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-runtime
  namespace: agent-platform
type: Opaque
stringData:
  gitea-registry-host: gitea.demoserver2.buzz
  gitea-org: agent-apps
  gitea-runner-scope: org
  # Use a real Gitea username that can push container packages.
  gitea-registry-username: change-me
  # Prefer a PAT with package write access over a raw account password.
  gitea-registry-password: change-me
  kimibuilt-build-events-url: https://kimibuilt.demoserver2.buzz/api/integrations/gitea/build-events
  kimibuilt-build-events-secret: change-me
  # Set to `1` only as a temporary workaround for an untrusted KimiBuilt TLS
  # certificate on the runner host.
  kimibuilt-build-events-insecure: "0"
  buildkit-host: tcp://buildkitd.agent-platform.svc.cluster.local:1234
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-app-ini
  namespace: agent-platform
data:
  app.ini: |
    APP_NAME = KimiBuilt Agent Platform
    RUN_MODE = prod

    [server]
    DOMAIN = gitea.demoserver2.buzz
    ROOT_URL = https://gitea.demoserver2.buzz/
    HTTP_ADDR = 0.0.0.0
    HTTP_PORT = 3000
    SSH_DOMAIN = gitea.demoserver2.buzz
    START_SSH_SERVER = false

    [database]
    DB_TYPE = sqlite3
    PATH = /data/gitea/gitea.db

    [service]
    DISABLE_REGISTRATION = true
    REQUIRE_SIGNIN_VIEW = false
    DEFAULT_KEEP_EMAIL_PRIVATE = true

    [actions]
    ENABLED = true
    DEFAULT_ACTIONS_URL = github

    [packages]
    ENABLED = true

    [packages.container]
    ENABLED = true

    [registry]
    ENABLED = true
    DOMAIN = gitea.demoserver2.buzz

    [security]
    INSTALL_LOCK = true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: act-runner-config
  namespace: agent-platform
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 1
      timeout: 1h
      insecure: false
    host:
      workdir_parent: /workspace
  bootstrap-runner.sh: |
    #!/bin/sh
    set -eu
    api_base="${GITEA_INSTANCE_URL%/}/api/v1"
    runner_scope="${GITEA_RUNNER_SCOPE:-org}"
    case "$runner_scope" in
      instance)
        token_url="$api_base/admin/actions/runners/registration-token"
        ;;
      org)
        if [ -z "${GITEA_ORG:-}" ]; then
          echo "GITEA_ORG is required when GITEA_RUNNER_SCOPE=org" >&2
          exit 1
        fi
        token_url="$api_base/orgs/$GITEA_ORG/actions/runners/registration-token"
        ;;
      *)
        echo "Unsupported GITEA_RUNNER_SCOPE=$runner_scope" >&2
        exit 1
        ;;
    esac
    auth_user="${GITEA_ADMIN_USERNAME:-}"
    auth_password="${GITEA_ADMIN_PASSWORD:-}"
    if [ -z "$auth_user" ] || [ -z "$auth_password" ]; then
      echo "GITEA admin credentials are required for runner bootstrap" >&2
      exit 1
    fi
    token_payload="$(
      curl -fsSL \
        --retry 20 \
        --retry-delay 3 \
        --retry-all-errors \
        --user "$auth_user:$auth_password" \
        "$token_url"
    )"
    token="$(printf '%s' "$token_payload" | tr -d '\n' | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
    if [ -z "$token" ]; then
      echo "Failed to extract runner registration token from Gitea" >&2
      printf '%s\n' "$token_payload" >&2
      exit 1
    fi
    mkdir -p /bootstrap-out
    printf '%s' "$token" > /bootstrap-out/runner-registration-token
    chmod 600 /bootstrap-out/runner-registration-token
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkit-cache
  namespace: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: seed-app-ini
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /data/gitea/conf
              if [ ! -s /data/gitea/conf/app.ini ]; then
                cp /config/app.ini /data/gitea/conf/app.ini
              fi
              chown -R 1000:1000 /data
              chmod 755 /data/gitea/conf
              chmod 640 /data/gitea/conf/app.ini
          volumeMounts:
            - name: data
              mountPath: /data
            - name: app-ini-template
              mountPath: /config/app.ini
              subPath: app.ini
      containers:
        - name: gitea
          image: gitea/gitea:1.23.4
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA__service__REQUIRE_SIGNIN_VIEW
              value: "false"
            - name: GITEA__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-actions
                  key: shared-secret
            - name: GITEA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: gitea-admin
                  key: username
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-admin
                  key: password
            - name: GITEA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gitea-admin
                  key: email
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: app-ini-template
          configMap:
            name: gitea-app-ini
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-http
  namespace: agent-platform
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.17.2
          args:
            - --addr=tcp://0.0.0.0:1234
          ports:
            - containerPort: 1234
              name: buildkit
          securityContext:
            privileged: true
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkit-cache
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: agent-platform
spec:
  selector:
    app: buildkitd
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      initContainers:
        - name: bootstrap-runner-token
          image: curlimages/curl:8.11.1
          command:
            - sh
            - /bootstrap/bootstrap-runner.sh
          env:
            - name: GITEA_INSTANCE_URL
              value: https://gitea.demoserver2.buzz
            - name: GITEA_ORG
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitea-org
            - name: GITEA_RUNNER_SCOPE
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitea-runner-scope
            - name: GITEA_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gitea-admin
                  key: username
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-admin
                  key: password
          volumeMounts:
            - name: runner-bootstrap-script
              mountPath: /bootstrap/bootstrap-runner.sh
              subPath: bootstrap-runner.sh
            - name: runner-bootstrap
              mountPath: /bootstrap-out
      containers:
        - name: act-runner
          image: gitea/act_runner:0.2.11
          command:
            - sh
            - -c
            - |
              set -eu
              export GITEA_RUNNER_REGISTRATION_TOKEN="$(cat /bootstrap/runner-registration-token)"
              exec act_runner daemon --config /data/config.yaml
          env:
            - name: GITEA_INSTANCE_URL
              value: https://gitea.demoserver2.buzz
            - name: GITEA_RUNNER_NAME
              value: agent-platform-runner
            - name: GITEA_RUNNER_LABELS
              value: ubuntu-latest:host
            - name: GITEA_RUNNER_EPHEMERAL
              value: "false"
            - name: GITEA_REGISTRY_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitea-registry-host
            - name: GITEA_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitea-registry-username
            - name: GITEA_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: gitea-registry-password
            - name: KIMIBUILT_BUILD_EVENTS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-url
            - name: KIMIBUILT_BUILD_EVENTS_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-secret
            - name: KIMIBUILT_BUILD_EVENTS_INSECURE
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: kimibuilt-build-events-insecure
            - name: BUILDKIT_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-platform-runtime
                  key: buildkit-host
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-bootstrap
              mountPath: /bootstrap
            - name: runner-config
              mountPath: /data/config.yaml
              subPath: config.yaml
            - name: runner-workspace
              mountPath: /workspace
      volumes:
        - name: runner-bootstrap
          emptyDir: {}
        - name: runner-bootstrap-script
          configMap:
            name: act-runner-config
            defaultMode: 493
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: act-runner-config
        - name: runner-workspace
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea
  namespace: agent-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - gitea.demoserver2.buzz
      secretName: gitea-tls
  rules:
    - host: gitea.demoserver2.buzz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea-http
                port:
                  number: 80
