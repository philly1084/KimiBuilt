# Rancher single-file stack update for KimiBuilt with nginx frontend proxy.
# Apply this manifest through the Rancher UI to update the full stack at once.
#
# Required existing secrets in namespace `kimibuilt`:
# 1. kimibuilt-secrets
#    - OPENAI_API_KEY
#    - POSTGRES_PASSWORD
#    - GITHUB_TOKEN (recommended for managed clone/push/deploy flows)
# Optional but recommended for remote deploy operations from the backend:
#    - KIMIBUILT_SSH_HOST
#    - KIMIBUILT_SSH_PORT
#    - KIMIBUILT_SSH_USERNAME
#    - KIMIBUILT_SSH_PASSWORD
#
# This stack keeps nginx as the public frontend tier.
# nginx proxies all frontend, API, and WebSocket traffic to the backend service.

---
apiVersion: v1
kind: Namespace
metadata:
  name: kimibuilt
  labels:
    app.kubernetes.io/name: kimibuilt

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  API_BASE_URL: "https://kimibuilt.secdevsolutions.help"
  KIMIBUILT_ALLOWED_ORIGINS: "https://kimibuilt.secdevsolutions.help,https://kimibuilt.demoserver2.buzz,https://168.119.176.121,http://168.119.176.121"
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_REQUEST_TIMEOUT_MS: "900000"
  OPENAI_TOOL_REQUEST_TIMEOUT_MS: "900000"
  OPENAI_IMAGE_MODEL: "gpt-image-2"
  TTS_PROVIDER: "kokoro"
  TTS_FALLBACK_PROVIDER: "piper"
  TTS_FALLBACK_ENABLED: "true"
  KOKORO_TTS_ENABLED: "true"
  KOKORO_TTS_MODEL_ID: "onnx-community/Kokoro-82M-v1.0-ONNX"
  KOKORO_TTS_BASE_URL: "http://kokoro-tts:3001"
  KOKORO_TTS_DEVICE: "cpu"
  KOKORO_TTS_DTYPE: "q8"
  KOKORO_TTS_CACHE_DIR: "/app/data/kokoro/cache"
  KOKORO_TTS_ALLOW_REMOTE_MODELS: "false"
  KOKORO_TTS_PORT: "3001"
  KOKORO_TTS_VOICES_PATH: "/app/data/kokoro/voices/manifest.json"
  KOKORO_TTS_DEFAULT_VOICE_ID: "af_heart"
  KOKORO_TTS_TIMEOUT_MS: "120000"
  KOKORO_TTS_PODCAST_TIMEOUT_MS: "300000"
  KOKORO_TTS_PODCAST_CHUNK_CHARS: "700"
  PODCAST_TTS_CONCURRENCY: "1"
  AUDIO_PROCESSING_TIMEOUT_MS: "900000"
  PODCAST_MASTERING_ENABLED: "false"
  PODCAST_TOOL_TIMEOUT_MS: "2700000"
  PODCAST_VIDEO_SEGMENT_TIMEOUT_MS: "240000"
  PODCAST_VIDEO_MUX_TIMEOUT_MS: "900000"
  PODCAST_VIDEO_MAX_FFMPEG_TIMEOUT_MS: "1800000"
  PODCAST_VIDEO_RENDER_MODE: "storyboard"
  PODCAST_VIDEO_DEFAULT_SCENE_COUNT: "14"
  PODCAST_VIDEO_AUDIO_REPAIR_ENABLED: "false"
  PODCAST_VIDEO_X264_PRESET: "veryfast"
  PODCAST_VIDEO_X264_CRF: "23"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "kimibuilt"
  POSTGRES_USER: "kimibuilt"
  POSTGRES_SSL: "false"
  FRONTEND_PATH: "/app/frontend"
  ARTIFACT_BROWSER_PATH: "/usr/bin/chromium"
  ARTIFACT_BROWSER_ARGS: "--disable-software-rasterizer"
  ARTIFACT_PDF_TIMEOUT_MS: "15000"
  KIMIBUILT_DEPLOY_REPO_URL: "https://github.com/philly1084/KimiBuilt.git"
  KIMIBUILT_DEPLOY_TARGET_DIR: "/opt/kimibuilt"
  KIMIBUILT_DEPLOY_MANIFESTS_PATH: "k8s"
  KIMIBUILT_DEPLOY_NAMESPACE: "kimibuilt"
  KIMIBUILT_DEPLOY_DEPLOYMENT: "backend"
  KIMIBUILT_DEPLOY_CONTAINER: "backend"
  KIMIBUILT_DEPLOY_BRANCH: "master"
  KIMIBUILT_GIT_COMMIT_NAME: "KimiBuilt Agent"
  KIMIBUILT_GIT_COMMIT_EMAIL: "kimibuilt-agent@local.invalid"
  KIMIBUILT_DATA_DIR: "/home/kimibuilt/.kimibuilt"
  KIMIBUILT_STATE_DIR: "/home/kimibuilt/.kimibuilt"
  OPENCODE_REMOTE_DEFAULT_WORKSPACE: "/opt/kimibuilt"
  OPENCODE_REMOTE_AUTO_INSTALL: "true"
  PORT: "3000"
  NODE_ENV: "production"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-nginx-config
  namespace: kimibuilt
data:
  default.conf: |
    server {
      listen 80;
      listen [::]:80;
      server_name _;

      client_max_body_size 25m;

      location /ws {
        proxy_pass http://backend:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }

      location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
      }
    }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-state
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kimibuilt
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: Always
          args:
            - -c
            - shared_buffers=1536MB
            - -c
            - effective_cache_size=12GB
            - -c
            - maintenance_work_mem=512MB
            - -c
            - work_mem=16MB
            - -c
            - max_connections=100
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_buffers=16MB
            - -c
            - random_page_cost=1.1
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: kimibuilt-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: kimibuilt-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimibuilt-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "3000m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kimibuilt
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.6
          imagePullPolicy: Always
          env:
            - name: QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS
              value: "4"
            - name: QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS
              value: "2"
            - name: QDRANT__SERVICE__MAX_WORKERS
              value: "4"
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "5Gi"
              cpu: "4000m"
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      initContainers:
        - name: model-pull
          image: ollama/ollama:0.5.7
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              /bin/ollama serve &
              pid=$!
              sleep 10
              /bin/ollama pull nomic-embed-text:latest
              kill $pid || true
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:0.5.7
          imagePullPolicy: Always
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
            - name: OLLAMA_MAX_QUEUE
              value: "256"
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "3Gi"
              cpu: "2000m"
            limits:
              memory: "8Gi"
              cpu: "6000m"
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-data

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro-tts
  namespace: kimibuilt
  labels:
    app: kokoro-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kokoro-tts
  template:
    metadata:
      labels:
        app: kokoro-tts
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: kokoro-tts
          image: ghcr.io/philly1084/kimibuilt:sha-e5e1669
          imagePullPolicy: Always
          command:
            - node
            - src/kokoro-tts-server.js
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
          env:
            - name: PORT
              value: "3001"
            - name: KOKORO_TTS_BASE_URL
              value: ""
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
            - name: UV_THREADPOOL_SIZE
              value: "8"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /live
              port: 3001
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "1536Mi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "3000m"

---
apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts
  namespace: kimibuilt
  labels:
    app: kokoro-tts
spec:
  selector:
    app: kokoro-tts
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:sha-e5e1669
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=4096"
            - name: UV_THREADPOOL_SIZE
              value: "16"
            - name: OPENAI_IMAGE_BATCH_CONCURRENCY
              value: "5"
            - name: PODCAST_TTS_CONCURRENCY
              value: "2"
          volumeMounts:
            - name: backend-state
              mountPath: /home/kimibuilt/.kimibuilt
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "4000m"
      volumes:
        - name: backend-state
          persistentVolumeClaim:
            claimName: backend-state

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kimibuilt
  labels:
    app: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: nginx-config
          configMap:
            name: kimibuilt-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kimibuilt
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kimibuilt-cors
  namespace: kimibuilt
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
    accessControlAllowOriginList:
      - "https://kimibuilt.secdevsolutions.help"
      - "https://kimibuilt.demoserver2.buzz"
      - "http://localhost:8080"
      - "http://localhost:3000"
    accessControlMaxAge: 100
    addVaryHeader: true

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kimibuilt-ingress
  namespace: kimibuilt
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: kimibuilt-cors@kubernetescrd
    traefik.ingress.kubernetes.io/proxy-read-timeout: "300"
    traefik.ingress.kubernetes.io/proxy-send-timeout: "300"
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
spec:
  tls:
    - hosts:
        - kimibuilt.secdevsolutions.help
        - kimibuilt.demoserver2.buzz
      secretName: kimibuilt-tls
  rules:
    - host: kimibuilt.secdevsolutions.help
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: kimibuilt.demoserver2.buzz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
