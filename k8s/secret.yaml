apiVersion: v1
kind: Secret
metadata:
  name: kimibuilt-secrets
  namespace: kimibuilt
type: Opaque
# NOTE: This secret should be created via kubectl command, not applied directly.
# OPENAI_API_KEY is the gateway key for chat/tool use.
# OPENAI_MEDIA_API_KEY is the official OpenAI key for image/video generation.
# KIMIBUILT_SSH_* values are optional defaults for the ssh-execute tool.
#
# To create the secret, run:
#   kubectl create secret generic kimibuilt-secrets \
#     --from-literal=OPENAI_API_KEY='your-gateway-api-key-here' \
#     --from-literal=OPENAI_MEDIA_API_KEY='your-official-openai-media-key-here' \
#     --from-literal=KIMIBUILT_SSH_HOST='10.0.0.5' \
#     --from-literal=KIMIBUILT_SSH_PORT='22' \
#     --from-literal=KIMIBUILT_SSH_USERNAME='ubuntu' \
#     --from-literal=KIMIBUILT_SSH_PASSWORD='your-ssh-password' \
#     --from-literal=KIMIBUILT_SSH_KEY_PATH='/home/kimibuilt/.ssh/id_rsa' \
#     --from-literal=POSTGRES_PASSWORD='choose-a-strong-password' \
#     -n kimibuilt
#
# Or update the existing secret with the additional OPENAI_MEDIA_API_KEY entry.
stringData:
  # Placeholder - this file is for documentation only.
  # The actual secret must be created via kubectl.
  OPENAI_API_KEY: "SET_VIA_KUBECTL_CREATE_SECRET"
  OPENAI_MEDIA_API_KEY: "SET_VIA_KUBECTL_CREATE_SECRET"
  KIMIBUILT_SSH_HOST: "OPTIONAL_SET_VIA_KUBECTL_CREATE_SECRET"
  KIMIBUILT_SSH_PORT: "22"
  KIMIBUILT_SSH_USERNAME: "OPTIONAL_SET_VIA_KUBECTL_CREATE_SECRET"
  KIMIBUILT_SSH_PASSWORD: "OPTIONAL_SET_VIA_KUBECTL_CREATE_SECRET"
  KIMIBUILT_SSH_KEY_PATH: "OPTIONAL_SET_VIA_KUBECTL_CREATE_SECRET"
  POSTGRES_PASSWORD: "SET_VIA_KUBECTL_CREATE_SECRET"
