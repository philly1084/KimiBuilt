name: Deploy to k3s

on:
  workflow_run:
    workflows: ["Build, Package, and Publish"]
    types:
      - completed
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: kimibuilt

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG secret is empty or not configured"
            exit 1
          fi

          if echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config 2>/dev/null; then
            echo "Decoded base64 kubeconfig secret"
          else
            echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
            echo "Using raw kubeconfig secret"
          fi

          chmod 600 ~/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify kubeconfig
        run: |
          test -s "$HOME/.kube/config"
          kubectl config current-context

      - name: Normalize image name
        run: |
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"

      - name: Update deployment image
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('sha-{0}', github.sha) || format('sha-{0}', github.event.workflow_run.head_sha) }}
        run: |
          # Update the image tag in deployment
          sed -i "s|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" k8s/backend-deployment.yaml
          
          # Verify the change
          grep "image:" k8s/backend-deployment.yaml

      - name: Deploy to k3s
        run: |
          # Apply namespace first
          kubectl apply -f k8s/namespace.yaml
          
          # Apply configmap
          kubectl apply -f k8s/configmap.yaml
          
          # Apply secret (should already exist with API key)
          # kubectl apply -f k8s/secret.yaml
          
          # Apply dependencies
          kubectl apply -f k8s/qdrant-deployment.yaml
          kubectl apply -f k8s/ollama-deployment.yaml
          
          # Apply backend with updated image
          kubectl apply -f k8s/backend-deployment.yaml
          
          # Apply production ingress for the Rancher/k3s domain
          kubectl apply -f k8s/rancher-ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n ${{ env.KUBE_NAMESPACE }} --timeout=180s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.KUBE_NAMESPACE }}
          echo ""
          echo "=== Deployment Status ==="
          kubectl get deployment backend -n ${{ env.KUBE_NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.KUBE_NAMESPACE }}
