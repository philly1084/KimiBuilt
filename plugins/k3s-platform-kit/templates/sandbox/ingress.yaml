apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-app
  namespace: __NAMESPACE__
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [__HOST__]
      secretName: sandbox-app-tls
  rules:
    - host: __HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sandbox-app
                port: {name: http}
