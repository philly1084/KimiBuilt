apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-app
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: sandbox-app}
  template:
    metadata:
      labels: {app.kubernetes.io/name: sandbox-app}
    spec:
      containers:
        - name: app
          image: __IMAGE__
          ports: [{name: http, containerPort: 80}]
          readinessProbe:
            httpGet: {path: /, port: http}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 256Mi}
