<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LillyBuilt Login</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.9);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-dark: #16a34a;
            --danger: #f87171;
            --input: rgba(15, 23, 42, 0.75);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Inter, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 28%),
                linear-gradient(160deg, #020617 0%, #0f172a 48%, #111827 100%);
        }

        .card {
            width: min(100%, 420px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            box-shadow: 0 30px 90px rgba(2, 6, 23, 0.45);
            padding: 28px;
            backdrop-filter: blur(14px);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.12);
            color: #bbf7d0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 8px;
            font-size: 32px;
            line-height: 1.1;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 14px;
            color: var(--muted);
        }

        input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 12px;
            background: var(--input);
            color: var(--text);
            padding: 13px 14px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.16);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            cursor: pointer;
        }

        button[disabled] {
            opacity: 0.65;
            cursor: wait;
        }

        .message {
            min-height: 20px;
            font-size: 14px;
            color: var(--danger);
        }

        .footer {
            margin-top: 18px;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <section class="card">
        <span class="eyebrow">Secure Access</span>
        <h1>LillyBuilt</h1>
        <p>Sign in to access the chat, notes, canvas, and admin frontends.</p>

        <form id="loginForm">
            <label>
                Username
                <input id="username" name="username" type="text" autocomplete="username" required>
            </label>
            <label>
                Password
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>
            <button id="submitButton" type="submit">Sign In</button>
            <div id="message" class="message" role="alert" aria-live="polite"></div>
        </form>

        <div class="footer">Authentication uses an HTTP-only session token.</div>
    </section>

    <script>
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get('returnTo') || '/';
        const form = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const submitButton = document.getElementById('submitButton');
        const message = document.getElementById('message');

        async function redirectIfAuthenticated() {
            try {
                const response = await fetch('/api/auth/session', {
                    credentials: 'same-origin',
                });
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.authenticated) {
                    window.location.replace(returnTo);
                }
            } catch (_error) {
                // Ignore session probe errors on the login page.
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            message.textContent = '';
            submitButton.disabled = true;
            submitButton.textContent = 'Signing In...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username.value.trim(),
                        password: password.value,
                        returnTo,
                    }),
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data?.error?.message || 'Login failed');
                }

                window.location.replace(data.returnTo || returnTo);
            } catch (error) {
                message.textContent = error.message || 'Login failed';
                submitButton.disabled = false;
                submitButton.textContent = 'Sign In';
            }
        });

        redirectIfAuthenticated();
        username.focus();
    </script>
</body>
</html>
