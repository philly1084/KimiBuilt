<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimiBuilt Web CLI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0d1117;
            color: #c9d1d9;
        }
        
        .terminal {
            background: #161b22;
            border: 1px solid #30363d;
        }
        
        .prompt { color: #58a6ff; }
        .user-input { color: #c9d1d9; }
        .ai-response { color: #7ee787; }
        .error { color: #f85149; }
        .system { color: #8b949e; }
        .timestamp { color: #6e7681; font-size: 0.75rem; }
        
        .command-line {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 0;
        }
        
        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #0d1117;
            border-top: 1px solid #30363d;
        }
        
        #commandInput {
            background: transparent;
            border: none;
            outline: none;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            flex: 1;
        }
        
        #commandInput::placeholder {
            color: #6e7681;
        }
        
        .output-area {
            height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 16px;
        }
        
        .output-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .output-area::-webkit-scrollbar-track {
            background: #0d1117;
        }
        
        .output-area::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        
        .mode-badge {
            background: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .model-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
        }
        
        .toolbar-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .toolbar-btn:hover {
            background: #30363d;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .streaming-cursor::after {
            content: '▋';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="terminal p-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-semibold text-white">🚀 KimiBuilt Web CLI</h1>
            <span id="modeBadge" class="mode-badge">chat</span>
            <span id="connectionStatus" class="text-xs text-gray-500">● Connecting...</span>
        </div>
        <div class="flex items-center gap-3">
            <select id="modelSelect" class="model-select">
                <option value="">Loading models...</option>
            </select>
            <button onclick="app.clearOutput()" class="toolbar-btn" title="Clear (Ctrl+L)">Clear</button>
            <button onclick="app.exportSession()" class="toolbar-btn" title="Export">Export</button>
            <a href="/" class="toolbar-btn no-underline">🏠 Home</a>
        </div>
    </header>

    <!-- Mode Tabs -->
    <div class="flex border-b border-gray-700">
        <button onclick="app.setMode('chat')" id="tab-chat" class="flex-1 py-2 text-sm hover:bg-gray-800 border-b-2 border-blue-500">Chat</button>
        <button onclick="app.setMode('canvas')" id="tab-canvas" class="flex-1 py-2 text-sm hover:bg-gray-800 border-b-2 border-transparent">Canvas</button>
        <button onclick="app.setMode('notation')" id="tab-notation" class="flex-1 py-2 text-sm hover:bg-gray-800 border-b-2 border-transparent">Notation</button>
    </div>

    <!-- Output Area -->
    <div id="outputArea" class="output-area">
        <div class="system">
            <div class="timestamp">${new Date().toLocaleTimeString()}</div>
            <div>Welcome to KimiBuilt Web CLI v1.0</div>
            <div>Type <span class="prompt">/help</span> for available commands</div>
            <div>Current mode: <span class="prompt">chat</span></div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <span id="promptSymbol" class="prompt">❯</span>
        <input 
            type="text" 
            id="commandInput" 
            placeholder="Type a message or /help for commands..."
            autocomplete="off"
            autofocus
        >
        <button onclick="app.sendCommand()" class="toolbar-btn">Send</button>
    </div>

    <!-- Session Info -->
    <div class="terminal px-4 py-2 text-xs flex justify-between">
        <span id="sessionInfo">Session: <span class="text-gray-500">none</span></span>
        <span class="text-gray-600">Shortcuts: Ctrl+L=Clear | Ctrl+C=Copy | ↑↓=History</span>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
