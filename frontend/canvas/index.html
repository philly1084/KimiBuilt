<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimiBuilt Canvas</title>
    
    <!-- CodeMirror 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/eclipse.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Main Container -->
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="sidebar-toggle" class="icon-btn" title="Toggle Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>KimiBuilt Canvas</span>
                </div>
            </div>
            <div class="header-center">
                <div class="canvas-type-selector">
                    <button class="type-btn active" data-type="code" title="Code Editor">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        <span>Code</span>
                    </button>
                    <button class="type-btn" data-type="document" title="Document Editor">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <span>Document</span>
                    </button>
                    <button class="type-btn" data-type="diagram" title="Diagram Editor">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Diagram</span>
                    </button>
                </div>
            </div>
            <div class="header-right">
                <!-- Model Selector -->
                <div class="model-selector">
                    <select id="model-select" class="model-select" title="Select AI Model">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button id="new-session-btn" class="icon-btn" title="New Session (Ctrl+N)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Left Sidebar - Prompt Panel -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-content">
                    <!-- Session Info -->
                    <div class="session-info">
                        <div class="session-label">Session ID</div>
                        <div class="session-id" id="session-id">New Session</div>
                    </div>

                    <!-- Quick Templates -->
                    <div class="templates-section" id="templates-section">
                        <label class="section-label">Quick Templates</label>
                        <div class="template-chips">
                            <button class="template-chip" data-prompt="Create a React component with props and TypeScript interfaces" data-type="code">
                                <span class="chip-icon">⚛️</span>
                                <span>React Component</span>
                            </button>
                            <button class="template-chip" data-prompt="Write a Python function with docstring and type hints" data-type="code">
                                <span class="chip-icon">🐍</span>
                                <span>Python Function</span>
                            </button>
                            <button class="template-chip" data-prompt="Create an API endpoint with Express.js including error handling" data-type="code">
                                <span class="chip-icon">🌐</span>
                                <span>API Endpoint</span>
                            </button>
                            <button class="template-chip" data-prompt="Write a comprehensive README.md for a project" data-type="document">
                                <span class="chip-icon">📝</span>
                                <span>README</span>
                            </button>
                            <button class="template-chip" data-prompt="Create a flowchart diagram showing user authentication flow" data-type="diagram">
                                <span class="chip-icon">📊</span>
                                <span>Auth Flow</span>
                            </button>
                            <button class="template-chip" data-prompt="Design a database schema with relationships" data-type="diagram">
                                <span class="chip-icon">🗄️</span>
                                <span>DB Schema</span>
                            </button>
                        </div>
                    </div>

                    <!-- Prompt Input -->
                    <div class="prompt-section">
                        <label class="section-label">Prompt</label>
                        <textarea id="prompt-input" class="prompt-textarea" placeholder="Describe what you want to create or modify..."></textarea>
                    </div>

                    <!-- Context Input -->
                    <div class="context-section">
                        <label class="section-label">
                            Context (Optional)
                            <button id="use-current-content" class="link-btn">Use current content</button>
                        </label>
                        <textarea id="context-input" class="context-textarea" placeholder="Add context or existing content..."></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button id="send-btn" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                            Send to AI
                        </button>
                        <button id="clear-btn" class="btn btn-secondary">Clear</button>
                    </div>

                    <!-- AI Response Preview -->
                    <div id="ai-response-section" class="ai-response-section hidden">
                        <label class="section-label">AI Response</label>
                        <div class="response-preview" id="response-preview"></div>
                        <button id="apply-btn" class="btn btn-accent">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            Apply to Canvas
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Resizer -->
            <div id="resizer" class="resizer"></div>

            <!-- Right Panel - Canvas/Editor -->
            <div class="canvas-panel">
                <!-- Tabs -->
                <div class="tabs-bar">
                    <div class="tab active" data-tab="editor">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        <span id="tab-title">Untitled</span>
                        <span class="tab-dirty hidden">●</span>
                    </div>
                    <div class="tab-actions">
                        <button id="toggle-preview" class="icon-btn small hidden" title="Toggle Preview">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <button id="toggle-split" class="icon-btn small hidden" title="Toggle Split View">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="12" y1="3" x2="12" y2="21"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Editor Area -->
                <div class="editor-container">
                    <div id="editor-wrapper" class="editor-wrapper">
                        <textarea id="editor"></textarea>
                    </div>
                    <div id="preview-wrapper" class="preview-wrapper hidden">
                        <div id="preview-content" class="preview-content"></div>
                    </div>
                    <div id="diagram-wrapper" class="diagram-wrapper hidden">
                        <div id="diagram-output" class="diagram-output"></div>
                    </div>
                </div>

                <!-- Suggestions Panel -->
                <div id="suggestions-panel" class="suggestions-panel hidden">
                    <div class="suggestions-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                        <span>Suggestions</span>
                    </div>
                    <div id="suggestions-list" class="suggestions-list"></div>
                </div>

                <!-- Status Bar -->
                <footer class="status-bar">
                    <div class="status-left">
                        <span id="canvas-type-badge" class="status-badge">Code</span>
                        <span id="language-badge" class="status-badge hidden">JavaScript</span>
                        <span class="status-separator">|</span>
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <span class="status-separator">|</span>
                        <span id="word-count">0 words</span>
                        <span class="status-separator">|</span>
                        <span id="line-count">0 lines</span>
                    </div>
                    <div class="status-right">
                        <button id="undo-btn" class="status-btn" title="Undo (Ctrl+Z)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 7v6h6"></path>
                                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                            </svg>
                        </button>
                        <button id="redo-btn" class="status-btn" title="Redo (Ctrl+Y)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 7v6h-6"></path>
                                <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 3.7"></path>
                            </svg>
                        </button>
                        <span class="status-separator">|</span>
                        <button id="copy-btn" class="status-btn" title="Copy to Clipboard">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>
                        <button id="download-btn" class="status-btn" title="Download File">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Download
                        </button>
                        <span class="status-separator">|</span>
                        <span id="save-status" class="save-status">Saved</span>
                    </div>
                </footer>
            </div>
        </main>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-spinner"></div>
            <span>Processing...</span>
        </div>
    </div>

    <!-- Scripts -->
    <!-- CodeMirror 6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/json/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/selection/active-line.min.js"></script>
    
    <!-- Mermaid.js -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/history.js"></script>
    <script src="js/export.js"></script>
    <script src="js/api.js"></script>
    <script src="js/canvas-types.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
    <script src="js/artifacts.js"></script>
</body>
</html>
