<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Lilly multi-workspace web chat">
    <meta name="theme-color" content="#0b1220">
    <link rel="icon" href="data:,">
    <title>Lilly Workspaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/workspace-host.css?v=20260422a">
</head>
<body class="workspace-host-page">
    <main class="workspace-host-shell" aria-label="Web chat workspaces">
        <header class="workspace-host-header">
            <div class="workspace-host-copy">
                <p class="workspace-host-kicker">Parallel web chat</p>
                <h1>Lilly Workspaces</h1>
                <p class="workspace-host-description">Run up to four isolated web-chat workspaces with their own sessions and live connections. Workspace 1 keeps the existing default chat history. Workspaces 2-4 stay separate for parallel projects.</p>
            </div>
            <div class="workspace-host-shortcuts" aria-label="Workspace shortcuts">
                <span><kbd>Ctrl</kbd> + <kbd>1</kbd>..<kbd>4</kbd> switch workspace</span>
            </div>
        </header>

        <nav id="workspace-tabs" class="workspace-tabs" aria-label="Chat workspaces" role="tablist"></nav>
        <section id="workspace-panels" class="workspace-panels" aria-live="polite"></section>
    </main>

    <script src="js/workspace-context.js?v=20260422a"></script>
    <script src="js/workspace-host.js?v=20260422a"></script>
</body>
</html>
