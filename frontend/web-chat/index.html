<!DOCTYPE html>
<html lang="en" data-theme="dark" data-chat-theme="obsidian">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Lilly web chat">
    <meta name="theme-color" content="#0b1220">
    <link rel="icon" href="data:,">
    <title>Lilly</title>
    <script>
        (function openSingleWorkspace() {
            const target = new URL('app.html', window.location.href);
            const current = new URL(window.location.href);
            current.searchParams.forEach((value, key) => {
                if (!['workspace', 'workspaceKey', 'workspace_key', 'workspaceLabel', 'workspace_label', 'embedded', 'embed'].includes(key)) {
                    target.searchParams.set(key, value);
                }
            });
            window.location.replace(target.toString());
        })();
    </script>
</head>
<body>
    <noscript>
        <p><a href="app.html">Open Lilly web chat</a></p>
    </noscript>
</body>
</html>
