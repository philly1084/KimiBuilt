<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcast Wave - Lilly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <a class="back-link" href="/">Lilly</a>
        <div>
          <p class="eyebrow">Studio</p>
          <h1>Podcast Wave</h1>
        </div>
        <div class="runtime" id="runtime-status">Checking runtime...</div>
      </header>

      <div class="layout">
        <form class="control-panel" id="render-form">
          <input name="renderMode" type="hidden" value="waveform-card">
          <input name="generateImages" type="hidden" value="false">
          <input name="visualEffects" type="hidden" value="false">

          <div class="section-heading">
            <h2>Audio</h2>
          </div>

          <label class="field">
            <span>Title</span>
            <input name="title" type="text" placeholder="Episode title">
          </label>

          <label class="drop-zone" id="drop-zone">
            <input name="audio" id="audio-input" type="file" accept="audio/*,video/mp4,video/webm">
            <span class="drop-zone__icon">+</span>
            <span class="drop-zone__text">Choose audio</span>
            <span class="drop-zone__meta" id="file-meta">WAV, MP3, M4A, MP4, or WebM</span>
          </label>

          <div class="field-grid">
            <label class="field">
              <span>Aspect</span>
              <select name="aspectRatio">
                <option value="16:9">16:9 landscape</option>
                <option value="9:16">9:16 vertical</option>
                <option value="1:1">1:1 square</option>
              </select>
            </label>

            <label class="check-field">
              <input name="enhanceAudio" type="checkbox">
              <span>Audio repair</span>
            </label>
          </div>

          <label class="field">
            <span>Transcript</span>
            <textarea name="transcript" rows="6" placeholder="Optional"></textarea>
          </label>

          <button class="primary-action" type="submit" id="render-button">Render MP4</button>
        </form>

        <section class="preview-panel">
          <div class="wave-preview" aria-hidden="true">
            <div class="wave-preview__rail">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>

          <div class="status-card" id="status-card">
            <div class="status-card__dot"></div>
            <div>
              <h2 id="status-title">Ready</h2>
              <p id="status-message">Choose an audio file to render a waveform MP4.</p>
            </div>
          </div>

          <div class="result" id="result" hidden>
            <video id="result-video" controls preload="metadata"></video>
            <div class="result-actions">
              <a class="secondary-action" id="download-link" href="#" download>Download MP4</a>
              <a class="secondary-action" id="artifact-link" href="#" target="_blank" rel="noreferrer">Open Artifact</a>
            </div>
          </div>

          <dl class="render-details" id="render-details" hidden>
            <div>
              <dt>Mode</dt>
              <dd id="detail-mode">waveform-card</dd>
            </div>
            <div>
              <dt>Duration</dt>
              <dd id="detail-duration">0:00</dd>
            </div>
            <div>
              <dt>Output</dt>
              <dd id="detail-output">MP4 H.264 / AAC</dd>
            </div>
          </dl>
        </section>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
