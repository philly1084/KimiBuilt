# ==========================================
# KimiBuilt Full Deployment - k3s / Rancher
# ==========================================

---
# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: kimibuilt
  labels:
    app.kubernetes.io/name: kimibuilt

---
# 2. GHCR Registry Secret Replication
# Note: The user mentioned `ghcr-secret` exists in the `default` namespace.
# Kubernetes cannot pull secrets across namespaces. To pull the image into `kimibuilt`,
# the secret MUST be copied into the `kimibuilt` namespace.
# Please copy the secret `ghcr-secret` from the `default` namespace to the `kimibuilt` namespace via the Rancher UI BEFORE applying.

---
# 3. KimiBuilt Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  PORT: "3000"
  NODE_ENV: "production"

---
# 4. KimiBuilt API Key Secret
apiVersion: v1
kind: Secret
metadata:
  name: kimibuilt-secrets
  namespace: kimibuilt
type: Opaque
stringData:
  OPENAI_API_KEY: "sk_3e8a1c6d9f0b4a72e5d1c9f3b6a8e2d4f7c1b0a9e6d3f5a2c8b1e7d4f9a0c6b"

---
# 5. Persistent Volumes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# 6. Qdrant (Vector Database)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  type: ClusterIP

---
# 7. Ollama (Embedding Model)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: model-pull
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              /bin/ollama serve &
              pid=$!
              sleep 10
              /bin/ollama pull nomic-embed-text:latest
              kill $pid || true
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-data

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  type: ClusterIP

---
# 8. Backend Node.js Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
# 9. Traefik IngressRoute
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: kimibuilt-ingressroute
  namespace: kimibuilt
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`kimibuilt.secdevsolutions.help`)
      services:
        - name: backend
          port: 3000
  tls:
    secretName: kimibuilt-tls-cert
