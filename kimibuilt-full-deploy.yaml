# ==========================================
# KimiBuilt Full Deployment - k3s / Rancher
# ==========================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: kimibuilt
  labels:
    app.kubernetes.io/name: kimibuilt

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimibuilt-config
  namespace: kimibuilt
data:
  OPENAI_BASE_URL: "http://n8n-openai-cli-gateway.n8n-openai-gateway.svc.cluster.local/v1"
  OPENAI_MODEL: "gpt-4o"
  OPENAI_IMAGE_MODEL: "gpt-image-2"
  TTS_PROVIDER: "kokoro"
  TTS_FALLBACK_PROVIDER: "piper"
  TTS_FALLBACK_ENABLED: "true"
  KOKORO_TTS_ENABLED: "true"
  KOKORO_TTS_MODEL_ID: "onnx-community/Kokoro-82M-v1.0-ONNX"
  KOKORO_TTS_BASE_URL: "http://kokoro-tts:3001"
  KOKORO_TTS_DEVICE: "cpu"
  KOKORO_TTS_DTYPE: "q8"
  KOKORO_TTS_CACHE_DIR: "/app/data/kokoro/cache"
  KOKORO_TTS_ALLOW_REMOTE_MODELS: "false"
  KOKORO_TTS_PORT: "3001"
  KOKORO_TTS_VOICES_PATH: "/app/data/kokoro/voices/manifest.json"
  KOKORO_TTS_DEFAULT_VOICE_ID: "af_heart"
  KOKORO_TTS_TIMEOUT_MS: "120000"
  KOKORO_TTS_PODCAST_TIMEOUT_MS: "300000"
  KOKORO_TTS_PODCAST_CHUNK_CHARS: "700"
  PODCAST_TTS_CONCURRENCY: "1"
  AUDIO_PROCESSING_TIMEOUT_MS: "900000"
  PODCAST_MASTERING_ENABLED: "false"
  PODCAST_TOOL_TIMEOUT_MS: "2700000"
  PODCAST_VIDEO_SEGMENT_TIMEOUT_MS: "240000"
  PODCAST_VIDEO_MUX_TIMEOUT_MS: "900000"
  PODCAST_VIDEO_MAX_FFMPEG_TIMEOUT_MS: "1800000"
  PODCAST_VIDEO_RENDER_MODE: "storyboard"
  PODCAST_VIDEO_DEFAULT_SCENE_COUNT: "14"
  PODCAST_VIDEO_AUDIO_REPAIR_ENABLED: "false"
  PODCAST_VIDEO_X264_PRESET: "veryfast"
  PODCAST_VIDEO_X264_CRF: "23"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "conversations"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "kimibuilt"
  POSTGRES_USER: "kimibuilt"
  ARTIFACT_BROWSER_PATH: "/usr/bin/chromium"
  ARTIFACT_PDF_TIMEOUT_MS: "15000"
  PORT: "3000"
  NODE_ENV: "production"

---
# Existing secret required:
#   kubectl create secret generic kimibuilt-secrets \
#     --from-literal=OPENAI_API_KEY='your-gateway-api-key' \
#     --from-literal=POSTGRES_PASSWORD='choose-a-strong-password' \
#     -n kimibuilt
# Or create the same secret through Rancher before applying this manifest.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: kimibuilt
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kimibuilt
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: kimibuilt-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: kimibuilt-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kimibuilt-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kimibuilt
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: kimibuilt
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      initContainers:
        - name: model-pull
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              /bin/ollama serve &
              pid=$!
              sleep 10
              /bin/ollama pull nomic-embed-text:latest
              kill $pid || true
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-data

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kimibuilt
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro-tts
  namespace: kimibuilt
  labels:
    app: kokoro-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kokoro-tts
  template:
    metadata:
      labels:
        app: kokoro-tts
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: kokoro-tts
          image: ghcr.io/philly1084/kimibuilt:latest
          imagePullPolicy: Always
          command:
            - node
            - src/kokoro-tts-server.js
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
          env:
            - name: PORT
              value: "3001"
            - name: KOKORO_TTS_BASE_URL
              value: ""
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /live
              port: 3001
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

---
apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts
  namespace: kimibuilt
  labels:
    app: kokoro-tts
spec:
  selector:
    app: kokoro-tts
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/philly1084/kimibuilt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kimibuilt-config
            - secretRef:
                name: kimibuilt-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kimibuilt
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: kimibuilt-ingressroute
  namespace: kimibuilt
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`kimibuilt.secdevsolutions.help`)
      services:
        - name: backend
          port: 3000
  tls:
    secretName: kimibuilt-tls-cert
